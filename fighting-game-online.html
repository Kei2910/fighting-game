<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FIST FURY ONLINE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600;700&display=swap');

  :root {
    --red: #ff3c00;
    --blue: #00cfff;
    --pink: #ff4466;
    --yellow: #ffe566;
    --bg: #07070f;
    --panel: #0f0f1e;
    --border: #1e1e3a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    touch-action: none;
    color: #fff;
  }

  /* ===== LOBBY ===== */
  #lobby {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    width: min(400px, 94vw);
  }

  .game-title {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(32px, 8vw, 56px);
    color: var(--red);
    letter-spacing: 6px;
    text-shadow: 0 0 24px #ff3c0088, 0 0 60px #ff3c0033;
    text-align: center;
  }

  .subtitle {
    font-size: 13px;
    color: #00cfff;
    letter-spacing: 4px;
    margin-top: -14px;
    text-align: center;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 24px;
    width: 100%;
  }

  .panel-title {
    font-family: 'Black Ops One', cursive;
    font-size: 13px;
    color: #555;
    letter-spacing: 3px;
    margin-bottom: 14px;
  }

  .input-row {
    display: flex;
    gap: 8px;
  }

  input[type="text"] {
    flex: 1;
    background: #0a0a18;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    color: #fff;
    font-family: 'Black Ops One', cursive;
    font-size: 18px;
    letter-spacing: 3px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s;
    text-transform: uppercase;
  }
  input[type="text"]::placeholder { color: #333; font-size: 14px; letter-spacing: 2px; }
  input[type="text"]:focus { border-color: var(--red); }

  .btn-main {
    background: var(--red);
    color: #fff;
    border: none;
    border-radius: 6px;
    font-family: 'Black Ops One', cursive;
    font-size: 16px;
    letter-spacing: 2px;
    padding: 12px 20px;
    cursor: pointer;
    box-shadow: 0 0 20px #ff3c0044;
    transition: transform 0.1s, box-shadow 0.1s;
    white-space: nowrap;
  }
  .btn-main:active { transform: scale(0.95); box-shadow: none; }
  .btn-main:disabled { background: #333; box-shadow: none; cursor: default; color: #666; }

  #status-msg {
    font-size: 15px;
    color: var(--yellow);
    letter-spacing: 2px;
    text-align: center;
    min-height: 22px;
    animation: blink 1.2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #status-msg.static { animation: none; color: #44ff88; }
  #status-msg.error { animation: none; color: var(--pink); }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 4px 0;
  }

  .hint {
    font-size: 12px;
    color: #444;
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.6;
  }

  /* ===== GAME ===== */
  #game-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  #game-title-bar {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(20px, 4vw, 32px);
    color: var(--red);
    letter-spacing: 4px;
    text-shadow: 0 0 16px #ff3c0066;
    margin-bottom: 5px;
  }

  #hud {
    width: min(680px, 96vw);
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    gap: 8px;
  }

  .player-info { flex: 1; }
  .player-info.right { text-align: right; }

  .pname {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(10px, 2.2vw, 14px);
    letter-spacing: 2px;
  }
  .pname.p1c { color: var(--blue); }
  .pname.p2c { color: var(--pink); }

  .hp-bar-bg {
    height: 12px;
    background: #111122;
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid #222;
    margin-top: 3px;
  }
  #p1-hp-bar { background: linear-gradient(90deg, var(--blue), #0088cc); height:100%; width:100%; transition: width 0.15s; }
  #p2-hp-bar { background: linear-gradient(90deg, var(--pink), #cc1133); height:100%; width:100%; float:right; transition: width 0.15s; }

  #timer-box { width:48px; text-align:center; flex-shrink:0; }
  #timer { font-family:'Black Ops One',cursive; font-size:clamp(20px,4vw,32px); color:var(--yellow); text-shadow:0 0 10px #ffe56677; line-height:1; }
  #round-label { font-size:10px; color:#555; letter-spacing:1px; }

  canvas {
    display: block;
    width: min(680px, 96vw);
    border: 1.5px solid #1a1a2e;
    border-radius: 4px;
    box-shadow: 0 0 40px #ff3c0018;
  }

  #controls {
    width: min(680px, 96vw);
    display: flex;
    justify-content: space-between;
    margin-top: 7px;
    gap: 8px;
    user-select: none;
  }

  .ctrl-side { display:flex; flex-direction:column; gap:5px; align-items:center; }

  .dpad {
    display: grid;
    grid-template-columns: repeat(3, 38px);
    grid-template-rows: repeat(2, 38px);
    gap: 3px;
  }

  .btn {
    background: #101022;
    border: 1.5px solid #222;
    border-radius: 6px;
    color: #888;
    font-family: 'Black Ops One', cursive;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.08s, transform 0.06s;
    -webkit-tap-highlight-color: transparent;
    width: 38px; height: 38px;
  }
  .btn:active, .btn.pressed { background: #1e1e3a; border-color: #444; transform: scale(0.91); }
  .btn.attack-btn { width:46px; height:46px; font-size:14px; }
  #btn-left  { grid-column:1; grid-row:1; }
  #btn-right { grid-column:3; grid-row:1; }
  #btn-jump  { grid-column:2; grid-row:1; color:var(--yellow); border-color:#443300; font-size:16px; }
  #btn-down  { grid-column:2; grid-row:2; font-size:16px; }
  #btn-punch { background:#120820; border-color:#442255; color:#bb77ff; }
  #btn-kick  { background:#141000; border-color:#443300; color:#ffbb33; }
  .attack-group { display:flex; flex-direction:column; gap:4px; align-items:center; }
  .attack-row { display:flex; gap:4px; }
  #btn-special { background:#140000; border-color:#440000; color:#ff4444; width:96px; height:36px; font-size:11px; }

  #overlay {
    position: fixed; inset: 0;
    background: #000000dd;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 100;
    backdrop-filter: blur(6px);
  }
  #overlay h1 {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(28px, 7vw, 54px);
    letter-spacing: 5px;
    margin-bottom: 12px;
  }
  #overlay p { font-size:clamp(13px,2.5vw,18px); color:#777; letter-spacing:2px; margin-bottom:24px; text-align:center; }
  #overlay .btn-main { font-size:18px; padding:14px 36px; }

  #combo-display {
    position: absolute; pointer-events: none;
    font-family: 'Black Ops One', cursive;
    font-size: 26px; color: var(--yellow);
    text-shadow: 0 0 10px #ffe56699;
    opacity: 0; transition: opacity 0.3s;
  }
  #hit-flash { position:absolute; inset:0; pointer-events:none; opacity:0; border-radius:4px; transition:opacity 0.08s; }

  #role-badge {
    font-size: 11px;
    color: #444;
    letter-spacing: 2px;
    margin-bottom: 3px;
    text-align: center;
  }

  #network-status {
    position: fixed;
    top: 8px; right: 10px;
    font-size: 10px;
    color: #333;
    letter-spacing: 1px;
  }
  #network-status.ok { color: #44ff88; }
  #network-status.err { color: var(--pink); }
</style>
</head>
<body>

<div id="network-status" class="ok">●  ONLINE</div>

<!-- ===== LOBBY ===== -->
<div id="lobby">
  <div>
    <div class="game-title">FIST FURY</div>
    <div class="subtitle">ONLINE</div>
  </div>

  <!-- あいことば -->
  <div class="panel" id="match-panel">
    <div class="panel-title">🔑 あいことば でマッチング</div>
    <div class="input-row">
      <input type="text" id="room-input" placeholder="あいことばを入力" maxlength="20">
      <button class="btn-main" id="btn-join">参加</button>
    </div>
    <div style="margin-top:10px;">
      <div id="status-msg" class="static">あいことばを入力してください</div>
    </div>
  </div>

  <div class="hint">
    同じあいことばを入力した2人がマッチします<br>
    先に入力した人が1P、後から入力した人が2P
  </div>
</div>

<!-- ===== GAME ===== -->
<div id="game-screen">
  <div id="game-title-bar">FIST FURY</div>
  <div id="role-badge">Loading...</div>

  <div id="hud">
    <div class="player-info">
      <div class="pname p1c" id="p1-name">1P</div>
      <div class="hp-bar-bg"><div id="p1-hp-bar"></div></div>
    </div>
    <div id="timer-box">
      <div id="timer">60</div>
      <div id="round-label">RND 1</div>
    </div>
    <div class="player-info right">
      <div class="pname p2c" id="p2-name">2P</div>
      <div class="hp-bar-bg" style="direction:rtl"><div id="p2-hp-bar"></div></div>
    </div>
  </div>

  <div style="position:relative;width:min(680px,96vw)">
    <canvas id="gameCanvas" width="680" height="280"></canvas>
    <div id="combo-display"></div>
    <div id="hit-flash"></div>
  </div>

  <div id="controls">
    <div class="ctrl-side">
      <div class="dpad">
        <div class="btn" id="btn-left">◀</div>
        <div class="btn" id="btn-jump">▲</div>
        <div class="btn" id="btn-right">▶</div>
        <div style="grid-column:2;grid-row:2"><div class="btn" id="btn-down">▼</div></div>
      </div>
    </div>
    <div class="ctrl-side">
      <div class="attack-group">
        <div class="attack-row">
          <div class="btn attack-btn" id="btn-punch">👊</div>
          <div class="btn attack-btn" id="btn-kick">🦵</div>
        </div>
        <div class="btn" id="btn-special">⚡ SPECIAL</div>
      </div>
    </div>
  </div>
</div>

<div id="overlay" style="display:none"></div>

<script type="module">
// ============================================================
//  ★ FIREBASE CONFIG ★
//  firebaseConfigをここに貼り付けるか、
//  画面上の入力欄から動的に設定します
// ============================================================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, update, remove, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA89lo2epwcfZHcEMn8ckGPwanVsEgQqkU",
  authDomain: "fighting-game-35a21.firebaseapp.com",
  databaseURL: "https://fighting-game-35a21-default-rtdb.firebaseio.com",
  projectId: "fighting-game-35a21",
  storageBucket: "fighting-game-35a21.firebasestorage.app",
  messagingSenderId: "763166903946",
  appId: "1:763166903946:web:34a09f768b8f353fdb2773"
};
const _app = initializeApp(firebaseConfig);
let db = getDatabase(_app);
let myRole = null; // 'p1' or 'p2'
let roomId = null;
let roomRef = null;
let unsubscribe = null;

// ============================================================
//  Firebase接続
// ============================================================
// ============================================================
//  マッチング
// ============================================================
document.getElementById('btn-join').addEventListener('click', async () => {
  const word = document.getElementById('room-input').value.trim().toUpperCase();
  if (!word) return;
  document.getElementById('btn-join').disabled = true;
  roomId = 'room_' + word;
  roomRef = ref(db, 'rooms/' + roomId);

  const snap = await get(roomRef);
  const data = snap.val();

  if (!data || !data.p1 || data.status === 'finished') {
    // 部屋を作成 → 1P
    myRole = 'p1';
    await set(roomRef, {
      status: 'waiting',
      word: word,
      p1: { x: 80, y: 0, hp: 100, state: 'idle', flipped: false, vx: 0, vy: 0 },
      p2: null,
      input_p1: { left:false, right:false, jump:false, down:false, punch:false, kick:false, special:false },
      input_p2: { left:false, right:false, jump:false, down:false, punch:false, kick:false, special:false },
      timer: 60, round: 1, p1wins: 0, p2wins: 0
    });
    onDisconnect(roomRef).remove();
    setStatus('⏳ 友達を待っています...', false);
    listenRoom();
  } else if (data.status === 'waiting' && !data.p2) {
    // 参加 → 2P
    myRole = 'p2';
    await update(roomRef, {
      status: 'playing',
      p2: { x: 550, y: 0, hp: 100, state: 'idle', flipped: true, vx: 0, vy: 0 }
    });
    setStatus('マッチ成立！', true);
    listenRoom();
    startGame();
  } else {
    setStatus('その部屋は満員です。別のあいことばを試してください', false);
    document.getElementById('status-msg').className = 'error';
    document.getElementById('btn-join').disabled = false;
  }
});

function setStatus(msg, isStatic) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = isStatic ? 'static' : '';
}

// ============================================================
//  部屋の監視
// ============================================================
function listenRoom() {
  unsubscribe = onValue(roomRef, snap => {
    const data = snap.val();
    if (!data) return;

    if (data.status === 'playing' && myRole === 'p1' && !gameRunning) {
      setStatus('マッチ成立！', true);
      startGame();
    }

    if (gameRunning) {
      syncFromFirebase(data);
    }
  });
}

// ============================================================
//  GAME ENGINE
// ============================================================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const FLOOR = H - 48;

let gameRunning = false;
let timerVal = 60, timerInterval;
let round = 1, p1wins = 0, p2wins = 0;

// ローカル入力
const myInput = { left:false, right:false, jump:false, down:false, punch:false, kick:false, special:false };

class Fighter {
  constructor(x, color, flipped) {
    this.x = x; this.y = FLOOR;
    this.w = 48; this.h = 72;
    this.vx = 0; this.vy = 0;
    this.speed = 4;
    this.color = color;
    this.flipped = flipped;
    this.hp = 100; this.maxHp = 100;
    this.state = 'idle';
    this.frame = 0; this.animTimer = 0;
    this.attackCooldown = 0;
    this.hurtTimer = 0;
    this.hitbox = null; this.hitActive = 0;
    this.specialCooldown = 0;
    this.combo = 0; this.comboTimer = 0;
    this.onGround = true;
    this.particles = [];
  }

  applyInput(input, opponent) {
    if (this.comboTimer > 0) { this.comboTimer--; if (!this.comboTimer) this.combo = 0; }
    if (this.hurtTimer > 0) this.hurtTimer--;
    if (this.attackCooldown > 0) this.attackCooldown--;
    if (this.specialCooldown > 0) this.specialCooldown--;
    if (this.hitActive > 0) this.hitActive--;
    if (this.state === 'dead') return;

    const facingRight = this.x < opponent.x;

    if (!this.hurtTimer && this.state !== 'attack') {
      if (input.left)       { this.vx = -this.speed; if (this.onGround) this.state = 'walk'; }
      else if (input.right) { this.vx = this.speed;  if (this.onGround) this.state = 'walk'; }
      else                  { this.vx *= 0.7; if (this.onGround && this.state === 'walk') this.state = 'idle'; }

      if (input.jump && this.onGround) { this.vy = -13; this.onGround = false; this.state = 'jump'; }
      if (input.down && this.onGround) this.state = 'block';
      else if (this.state === 'block' && !input.down) this.state = 'idle';
    }

    if (!this.attackCooldown && !this.hurtTimer) {
      if (input.punch)                          this.doAttack('punch', 8,  14, facingRight);
      else if (input.kick)                      this.doAttack('kick',  12, 20, facingRight);
      else if (input.special && !this.specialCooldown) this.doSpecial(facingRight);
    }

    this.vy += 0.6;
    this.y += this.vy; this.x += this.vx;
    if (this.y >= FLOOR) { this.y = FLOOR; this.vy = 0; this.onGround = true; if (this.state === 'jump') this.state = 'idle'; }
    this.x = Math.max(10, Math.min(W - this.w - 10, this.x));
    this.flipped = this.x > opponent.x;

    this.particles = this.particles.filter(p => p.life > 0);
    this.particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.life--; p.alpha = p.life/p.maxLife; });

    // Hit detection
    if (this.hitActive && this.hitbox) {
      const hb = this.hitbox;
      const ox = opponent.x, oy = opponent.y - opponent.h;
      if (hb.x < ox+opponent.w && hb.x+hb.w > ox && hb.y < oy+opponent.h && hb.y+hb.h > oy) {
        if (opponent.state === 'block' && opponent.onGround) {
          spawnHit(hb.x+hb.w/2, hb.y+hb.h/2, '#aaf');
        } else {
          opponent.takeHit(hb.dmg, this);
          spawnHit(hb.x+hb.w/2, hb.y+hb.h/2, hb.color||'#ff4');
        }
        this.hitActive = 0; this.hitbox = null;
      }
    }

    this.animTimer++;
    if (this.animTimer > 8) { this.animTimer = 0; this.frame = (this.frame+1)%4; }
  }

  doAttack(type, dmg, dur, fr) {
    this.state = 'attack'; this.attackCooldown = dur + 8;
    const reach = type === 'kick' ? 70 : 55;
    const hx = fr ? this.x+this.w : this.x-reach+10;
    const hy = type === 'kick' ? this.y-this.h*0.4 : this.y-this.h*0.7;
    this.hitbox = { x:hx, y:hy, w:reach, h:28, dmg, color: type==='kick'?'#ffcc44':'#cc88ff' };
    this.hitActive = dur;
    setTimeout(() => { if (this.state==='attack') this.state='idle'; }, (dur+8)*16);
  }

  doSpecial(fr) {
    this.specialCooldown = 90; this.state = 'attack';
    const hx = fr ? this.x+this.w : this.x-120;
    this.hitbox = { x:hx, y:this.y-this.h*0.6, w:120, h:40, dmg:22, color:'#ff4444' };
    this.hitActive = 18;
    for (let i=0;i<16;i++) this.particles.push({
      x:this.x+this.w/2, y:this.y-this.h/2,
      vx:(Math.random()-.5)*8, vy:(Math.random()-.5)*6-2,
      life:30, maxLife:30, alpha:1,
      color:['#ff4444','#ff8800','#ffff44'][Math.floor(Math.random()*3)]
    });
    flashScreen('#ff220022');
    setTimeout(() => { if (this.state==='attack') this.state='idle'; }, 320);
  }

  takeHit(dmg, attacker) {
    if (this.state === 'dead') return;
    this.hp = Math.max(0, this.hp - dmg);
    this.hurtTimer = 18; this.state = 'hurt';
    this.vx = this.x > attacker.x ? 5 : -5; this.vy = -4;
    attacker.combo++; attacker.comboTimer = 90;
    for (let i=0;i<8;i++) this.particles.push({
      x:this.x+this.w/2, y:this.y-this.h/2,
      vx:(Math.random()-.5)*5, vy:Math.random()*-5,
      life:20, maxLife:20, alpha:1, color:'#ff4466'
    });
    updateHPBars();
    if (this.hp <= 0) { this.state = 'dead'; this.vx = 0; endRound(this); }
    else setTimeout(() => { if (this.state==='hurt') this.state='idle'; }, 300);
  }

  draw() {
    ctx.save();
    const cx = this.x+this.w/2;

    this.particles.forEach(p => {
      ctx.globalAlpha = p.alpha; ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, 4, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath(); ctx.ellipse(cx, this.y+4, this.w*.6, 8, 0, 0, Math.PI*2); ctx.fill();

    ctx.translate(cx, this.y);
    if (this.flipped) ctx.scale(-1,1);

    const bob = this.state==='idle' ? Math.sin(this.animTimer*.3+this.frame)*2 : 0;
    const wOff = this.state==='walk' ? Math.sin(this.frame*1.5)*4 : 0;
    const alpha = this.state==='hurt' ? (Math.floor(this.hurtTimer/3)%2===0?1:0.3) : 1;
    ctx.globalAlpha = alpha;

    const bc = this.state==='block' ? '#446688' : this.color;
    const dc = this.state==='block' ? '#224466' : shade(this.color,-40);

    // Legs
    const ls = (this.state==='walk'||this.state==='jump') ? Math.sin(this.frame*1.5)*12 : (this.state==='attack'?10:0);
    drawLeg(ctx,-10,-28+bob, ls,dc); drawLeg(ctx,8,-28+bob,-ls,dc);

    // Torso
    ctx.fillStyle=bc; ctx.beginPath(); ctx.roundRect(-16,-this.h+bob+wOff,32,38,4); ctx.fill();
    ctx.fillStyle=dc; ctx.fillRect(-16,-this.h+32+bob+wOff,32,6);

    // Arms
    if (this.state==='attack') {
      ctx.fillStyle=this.color; ctx.save(); ctx.translate(0,-this.h+14+bob); ctx.rotate(-0.3);
      ctx.fillRect(12,-6,30,14); ctx.beginPath(); ctx.arc(42,1,9,0,Math.PI*2);
      ctx.fillStyle='#ffddaa'; ctx.fill(); ctx.restore();
    } else {
      const as=this.state==='walk'?Math.sin(this.frame*1.5)*8:0;
      ctx.fillStyle=this.color;
      ctx.save(); ctx.translate(-20,-this.h+10+bob+wOff); ctx.rotate(as*.05);
      ctx.beginPath(); ctx.roundRect(-6,0,12,26,4); ctx.fill(); ctx.restore();
      ctx.save(); ctx.translate(20,-this.h+10+bob+wOff); ctx.rotate(-as*.05);
      ctx.beginPath(); ctx.roundRect(-6,0,12,26,4); ctx.fill(); ctx.restore();
    }

    // Head
    ctx.fillStyle='#ffddaa'; ctx.beginPath(); ctx.arc(0,-this.h+bob+wOff-4,16,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=this.color==='#00cfff'?'#003366':'#660000';
    ctx.beginPath(); ctx.arc(0,-this.h+bob+wOff-10,14,Math.PI,0); ctx.fill();
    ctx.fillStyle=this.state==='hurt'?'#ff4444':'#222';
    ctx.beginPath(); ctx.arc(6,-this.h+bob+wOff-4,3,0,Math.PI*2); ctx.fill();

    if (this.specialCooldown>75) {
      ctx.globalAlpha=(this.specialCooldown-75)/15*.6;
      ctx.strokeStyle='#ff4400'; ctx.lineWidth=3;
      ctx.beginPath(); ctx.arc(0,-this.h/2+bob,this.w*.8,0,Math.PI*2); ctx.stroke();
    }
    ctx.globalAlpha=1; ctx.restore();
  }
}

function drawLeg(ctx,x,y,angle,color){
  ctx.save(); ctx.translate(x,y); ctx.rotate(angle*.05);
  ctx.fillStyle=color; ctx.beginPath(); ctx.roundRect(-6,0,12,28,3); ctx.fill(); ctx.restore();
}
function shade(hex,amt){
  if(!hex.startsWith('#'))return hex;
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,Math.min(255,r+amt))},${Math.max(0,Math.min(255,g+amt))},${Math.max(0,Math.min(255,b+amt))})`;
}

let hitEffects = [];
function spawnHit(x,y,color){ hitEffects.push({x,y,color,life:20,maxLife:20}); flashScreen(color+'22'); }
function flashScreen(color){
  const fl=document.getElementById('hit-flash');
  fl.style.background=color; fl.style.opacity='1';
  setTimeout(()=>fl.style.opacity='0',80);
}

let p1, p2;

// ============================================================
//  オンライン同期
// ============================================================
let inputSendInterval;

function startGame() {
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('game-screen').style.display = 'flex';
  document.getElementById('role-badge').textContent =
    myRole === 'p1' ? '▶ あなたは 1P（青）' : '▶ あなたは 2P（赤）';

  p1 = new Fighter(80,  '#00cfff', false);
  p2 = new Fighter(550, '#ff4466', true);
  updateHPBars();
  gameRunning = true;
  startTimer();
  requestAnimationFrame(gameLoop);

  // 自分の入力を定期送信（60ms）
  inputSendInterval = setInterval(sendInput, 60);
}

async function sendInput() {
  if (!db || !roomRef || !gameRunning) return;
  const key = 'input_' + myRole;
  await update(roomRef, { [key]: { ...myInput } });
}

let remoteInput = { left:false, right:false, jump:false, down:false, punch:false, kick:false, special:false };

function syncFromFirebase(data) {
  if (!data) return;
  // 相手の入力を取得
  const remoteKey = myRole === 'p1' ? 'input_p2' : 'input_p1';
  if (data[remoteKey]) remoteInput = data[remoteKey];

  // HPバー同期（相手が計算した結果を反映）
  if (myRole === 'p1' && data.p2) {
    if (typeof data.p2.hp === 'number') { p2.hp = data.p2.hp; updateHPBars(); }
  }
  if (myRole === 'p2' && data.p1) {
    if (typeof data.p1.hp === 'number') { p1.hp = data.p1.hp; updateHPBars(); }
  }
}

// ============================================================
//  ゲームループ
// ============================================================
function gameLoop() {
  if (!gameRunning) return;
  ctx.clearRect(0,0,W,H);
  drawBG();

  hitEffects = hitEffects.filter(e=>e.life>0);
  hitEffects.forEach(e=>{
    ctx.globalAlpha=e.life/e.maxLife; ctx.strokeStyle=e.color; ctx.lineWidth=3;
    const r=(1-e.life/e.maxLife)*30+10;
    ctx.beginPath(); ctx.arc(e.x,e.y,r,0,Math.PI*2); ctx.stroke();
    for(let i=0;i<4;i++){
      const a=(i/4)*Math.PI*2+e.life*.1, sr=r*.8;
      ctx.fillStyle=e.color; ctx.beginPath(); ctx.arc(e.x+Math.cos(a)*sr,e.y+Math.sin(a)*sr,3,0,Math.PI*2); ctx.fill();
    }
    e.life--;
  });
  ctx.globalAlpha=1;

  // 自分のキャラにはmyInput、相手にはremoteInput
  const p1in = myRole==='p1' ? myInput : remoteInput;
  const p2in = myRole==='p2' ? myInput : remoteInput;

  p1.applyInput(p1in, p2);
  p2.applyInput(p2in, p1);
  p1.draw(); p2.draw();

  // コンボ表示
  const ce=document.getElementById('combo-display');
  const showFor = p1.combo>=2 ? p1 : p2.combo>=2 ? p2 : null;
  if (showFor) {
    ce.style.opacity='1';
    ce.style.left=showFor.x+'px';
    ce.style.top=(showFor.y-showFor.h-30)*(canvas.clientHeight/H)+'px';
    ce.textContent=showFor.combo+' HIT!';
  } else ce.style.opacity='0';

  requestAnimationFrame(gameLoop);
}

function drawBG() {
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#0a0010'); grad.addColorStop(.6,'#150025'); grad.addColorStop(1,'#0a0010');
  ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);

  ctx.fillStyle='#0d0020';
  [[0,160,60],[60,180,40],[100,140,50],[150,165,35],[185,130,60],
   [245,170,45],[290,145,55],[345,160,40],[385,135,65],[450,170,50],
   [500,150,45],[545,140,60],[605,165,40],[645,155,35]
  ].forEach(([x,y,w])=>ctx.fillRect(x,y,w,H-y));

  const fg=ctx.createLinearGradient(0,FLOOR,0,H);
  fg.addColorStop(0,'#1a0a2e'); fg.addColorStop(1,'#0d0018');
  ctx.fillStyle=fg; ctx.fillRect(0,FLOOR,W,H-FLOOR);
  ctx.strokeStyle='#ff3c0055'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,FLOOR); ctx.lineTo(W,FLOOR); ctx.stroke();
}

function updateHPBars() {
  document.getElementById('p1-hp-bar').style.width=Math.max(0,p1.hp/p1.maxHp*100)+'%';
  document.getElementById('p2-hp-bar').style.width=Math.max(0,p2.hp/p2.maxHp*100)+'%';
}

function startTimer() {
  timerVal=60; document.getElementById('timer').textContent=timerVal;
  timerInterval=setInterval(()=>{
    timerVal--; document.getElementById('timer').textContent=timerVal;
    if(timerVal<=0){ clearInterval(timerInterval); timeUp(); }
  },1000);
}

function timeUp() {
  gameRunning=false;
  const w=p1.hp>=p2.hp?'1P':'2P';
  showOverlay(w+' WIN!','時間切れ！','#ffe566');
}

function endRound(loser) {
  gameRunning=false; clearInterval(timerInterval);
  const winner=loser===p1?'2P':'1P';
  if(loser===p1) p2wins++; else p1wins++;
  setTimeout(()=>{
    if(p1wins>=2||p2wins>=2) {
      showOverlay(winner+' WIN!','ゲーム終了！','#ffe566', false);
      if(db && roomRef) update(roomRef,{status:'finished'});
    } else {
      round++; document.getElementById('round-label').textContent='RND '+round;
      showOverlay(winner+' WIN!','ROUND '+round+' START!', winner==='1P'?'#00cfff':'#ff4466', true);
    }
  },600);
}

function showOverlay(title, sub, color, nextRound=false) {
  const ov=document.getElementById('overlay');
  ov.innerHTML=`
    <h1 style="color:${color};text-shadow:0 0 30px ${color}88">${title}</h1>
    <p>${sub}</p>
    <button class="btn-main" onclick="restartGame()" style="font-size:18px;padding:14px 36px">
      ${nextRound?'NEXT ROUND':'もう一度'}
    </button>
  `;
  ov.style.display='flex';
}

window.restartGame = function() {
  document.getElementById('overlay').style.display='none';
  p1=new Fighter(80,'#00cfff',false);
  p2=new Fighter(550,'#ff4466',true);
  updateHPBars();
  if(!nextRoundFlag){ p1wins=0; p2wins=0; round=1; document.getElementById('round-label').textContent='RND 1'; }
  gameRunning=true; startTimer(); requestAnimationFrame(gameLoop);
};
let nextRoundFlag=false;

// ============================================================
//  入力（タッチ + キーボード）
// ============================================================
document.addEventListener('keydown',e=>{
  switch(e.key){
    case 'ArrowLeft': case 'a': myInput.left=true; break;
    case 'ArrowRight': case 'd': myInput.right=true; break;
    case 'ArrowUp': case 'w': myInput.jump=true; break;
    case 'ArrowDown': case 's': myInput.down=true; break;
    case 'z': case 'Z': myInput.punch=true; break;
    case 'x': case 'X': myInput.kick=true; break;
    case 'c': case 'C': myInput.special=true; break;
  }
});
document.addEventListener('keyup',e=>{
  switch(e.key){
    case 'ArrowLeft': case 'a': myInput.left=false; break;
    case 'ArrowRight': case 'd': myInput.right=false; break;
    case 'ArrowUp': case 'w': myInput.jump=false; break;
    case 'ArrowDown': case 's': myInput.down=false; break;
    case 'z': case 'Z': myInput.punch=false; break;
    case 'x': case 'X': myInput.kick=false; break;
    case 'c': case 'C': myInput.special=false; break;
  }
});

function setupBtn(id,key){
  const el=document.getElementById(id); if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();myInput[key]=true;el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();myInput[key]=false;el.classList.remove('pressed');},{passive:false});
  el.addEventListener('mousedown',()=>myInput[key]=true);
  el.addEventListener('mouseup',()=>myInput[key]=false);
}
setupBtn('btn-left','left'); setupBtn('btn-right','right');
setupBtn('btn-jump','jump'); setupBtn('btn-down','down');
setupBtn('btn-punch','punch'); setupBtn('btn-kick','kick');
setupBtn('btn-special','special');
</script>
