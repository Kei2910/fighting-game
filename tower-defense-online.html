<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>BLADE FRONTIER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Rajdhani:wght@400;600;700&display=swap');
:root{--gold:#ffd700;--blue:#44aaff;--red:#ff6644;--green:#44ff88;--panel:#0a0c14;--border:#1e2a3a;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#050810;font-family:'Rajdhani',sans-serif;color:#fff;height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;touch-action:none;user-select:none;}

/* ── LOBBY ── */
#lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:18px;width:min(360px,94vw);}
.logo{font-family:'Cinzel',serif;font-size:clamp(28px,8vw,48px);font-weight:900;background:linear-gradient(135deg,#b8860b,#ffd700,#fff8dc,#ffd700,#b8860b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:5px;text-align:center;filter:drop-shadow(0 0 12px #ffd70066);}
.logo-sub{font-size:10px;color:#445;letter-spacing:5px;text-align:center;margin-top:-10px;}
.card{background:linear-gradient(135deg,#0d1422,#0a0f1c);border:1px solid #2a3a50;border-radius:12px;padding:20px;width:100%;box-shadow:0 4px 24px #00000088,inset 0 1px 0 #ffffff08;}
.card-title{font-size:10px;color:#445;letter-spacing:4px;margin-bottom:12px;font-weight:700;}
.row{display:flex;gap:8px;}
input[type=text]{flex:1;background:#060a14;border:1.5px solid #2a3a50;border-radius:8px;color:#fff;font-family:'Cinzel',serif;font-size:15px;letter-spacing:3px;padding:11px 14px;outline:none;text-transform:uppercase;transition:border-color 0.2s,box-shadow 0.2s;}
input[type=text]:focus{border-color:var(--gold);box-shadow:0 0 12px #ffd70033;}
input[type=text]::placeholder{color:#223;font-size:11px;}
.btn-gold{background:linear-gradient(135deg,#7a5500,#ffd700,#fff8aa,#ffd700,#7a5500);color:#1a0e00;border:none;border-radius:8px;font-family:'Cinzel',serif;font-weight:900;font-size:13px;letter-spacing:1px;padding:11px 18px;cursor:pointer;transition:transform 0.1s,filter 0.1s;white-space:nowrap;box-shadow:0 2px 12px #ffd70044;}
.btn-gold:active{transform:scale(0.93);filter:brightness(0.8);}
.btn-gold:disabled{background:#222;color:#444;cursor:default;box-shadow:none;}
#lobby-status{font-size:13px;letter-spacing:2px;text-align:center;color:var(--gold);min-height:20px;}
#lobby-status.ok{color:#44ff88;}
#lobby-status.err{color:#ff4444;}
#lobby-status.wait{animation:pulse 1.4s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.hint{font-size:11px;color:#334;text-align:center;line-height:1.8;}

/* ── GAME ── */
#game-wrap{display:none;flex-direction:column;width:100vw;height:100vh;overflow:hidden;}
#view-enemy{flex:1;position:relative;overflow:hidden;}
.view-divider{height:3px;background:linear-gradient(90deg,transparent,#ffd700,transparent);flex-shrink:0;}
#view-self{flex:1;position:relative;overflow:hidden;}
canvas{display:block;width:100%;height:100%;}

.hpbar-wrap{position:absolute;left:6px;right:6px;display:flex;align-items:center;gap:6px;pointer-events:none;z-index:10;}
.hp-label{font-family:'Cinzel',serif;font-size:9px;color:var(--gold);white-space:nowrap;text-shadow:0 0 6px #ffd70066;}
.hp-bg{flex:1;height:8px;background:#0a0a0a;border-radius:4px;overflow:hidden;border:1px solid #1a1a2a;box-shadow:inset 0 1px 3px #00000088;}
.hp-fill{height:100%;border-radius:4px;transition:width 0.25s;}
#my-hp-fill{background:linear-gradient(90deg,#00aa44,#44ff88,#aaffcc);}
#en-hp-fill{background:linear-gradient(90deg,#aa2200,#ff6644,#ffaa88);}
.hp-num{font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:#ccc;min-width:32px;text-align:right;}
.view-label{position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:8px;color:#334;letter-spacing:4px;pointer-events:none;text-shadow:none;}

/* ── CTRL ── */
#ctrl-area{height:152px;background:linear-gradient(180deg,#060a14,#040810);border-top:1px solid #1e2a3a;display:flex;flex-direction:column;padding:6px 8px 5px;gap:5px;flex-shrink:0;}
#tower-ctrl{display:flex;gap:6px;align-items:center;}
.btn-move{background:linear-gradient(135deg,#0f1828,#162238);border:1.5px solid #2a3a5a;border-radius:8px;color:#88aacc;font-size:20px;width:44px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background 0.08s,transform 0.06s;box-shadow:0 2px 8px #00000066;}
.btn-move:active,.btn-move.pressed{background:#1e3050;transform:scale(0.9);box-shadow:none;}
.btn-attack{background:linear-gradient(135deg,#3a0808,#8a1a1a,#3a0808);border:1.5px solid #cc3333;border-radius:8px;color:#ffcccc;font-size:12px;font-family:'Cinzel',serif;font-weight:700;letter-spacing:1px;padding:0 12px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.06s,filter 0.08s;flex:1;box-shadow:0 2px 12px #ff000033;}
.btn-attack:active{transform:scale(0.93);filter:brightness(1.4);box-shadow:0 0 16px #ff000066;}
#my-hp-ctrl{font-size:10px;color:#446;flex-shrink:0;}
#my-hp-ctrl span{color:#44ff88;font-weight:700;font-size:14px;text-shadow:0 0 8px #44ff8866;}
#troop-btns{display:flex;gap:4px;overflow-x:auto;padding-bottom:2px;flex:1;align-items:flex-start;}
#troop-btns::-webkit-scrollbar{height:3px;}
#troop-btns::-webkit-scrollbar-thumb{background:#2a3a50;border-radius:2px;}
.troop-btn{flex-shrink:0;width:54px;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;padding:4px 2px 3px;gap:1px;transition:transform 0.07s,filter 0.07s,box-shadow 0.07s;position:relative;border:1.5px solid transparent;}
.troop-btn:active{transform:scale(0.89);filter:brightness(1.3);}
.troop-btn.disabled{opacity:0.3;pointer-events:none;}
.troop-btn.sky-btn{border-color:#4ab8e8;background:linear-gradient(135deg,#060e1a,#0c1e2e);box-shadow:0 0 8px #4ab8e822;}
.troop-btn.land-btn{border-color:#5a9e30;background:linear-gradient(135deg,#060e06,#0c1e0c);box-shadow:0 0 8px #5a9e3022;}
.troop-btn.sea-btn{border-color:#2a7ab8;background:linear-gradient(135deg,#06080e,#0c1020);box-shadow:0 0 8px #2a7ab822;}
.troop-icon{font-size:20px;line-height:1.1;}
.troop-name{font-size:7px;color:#778;text-align:center;line-height:1.2;}
.troop-cost{font-size:9px;font-weight:700;}
.sky-btn .troop-cost{color:#4ab8e8;}
.land-btn .troop-cost{color:#7acc44;}
.sea-btn .troop-cost{color:#44aaff;}
.lane-badge{position:absolute;top:2px;right:2px;font-size:7px;width:12px;height:12px;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.sky-badge{background:#4ab8e833;color:#4ab8e8;}
.land-badge{background:#5a9e3033;color:#7acc44;}
.sea-badge{background:#2a7ab833;color:#44aaff;}

#result-overlay{display:none;position:fixed;inset:0;background:#000000dd;z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:18px;backdrop-filter:blur(8px);}
#result-overlay h1{font-family:'Cinzel',serif;font-size:clamp(32px,9vw,56px);letter-spacing:6px;}
#disconnect-msg{display:none;position:fixed;inset:0;background:#000000dd;z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#disconnect-msg h2{color:#ff4444;font-family:'Cinzel',serif;font-size:22px;letter-spacing:3px;}
#disconnect-msg p{color:#666;font-size:12px;}
#role-banner{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel',serif;font-size:20px;color:var(--gold);letter-spacing:3px;z-index:150;pointer-events:none;text-align:center;background:linear-gradient(135deg,#0a0f1e,#141e32);padding:22px 32px;border-radius:12px;border:1px solid #ffd70066;box-shadow:0 0 40px #ffd70022;}
</style>
</head>
<body>

<div id="lobby">
  <div>
    <div class="logo">BLADE FRONTIER</div>
    <div class="logo-sub">ONLINE TOWER DEFENSE</div>
  </div>
  <div class="card">
    <div class="card-title">⚔ あいことばでマッチング</div>
    <div class="row">
      <input type="text" id="room-input" placeholder="あいことばを入力" maxlength="20">
      <button class="btn-gold" id="btn-join">参加</button>
    </div>
    <div style="margin-top:10px"><div id="lobby-status" class="ok">あいことばを入力してください</div></div>
  </div>
  <div class="hint">同じあいことばを入力した2人がマッチ<br>先に入力 → 青陣営 / 後から入力 → 赤陣営</div>
</div>

<div id="game-wrap">
  <div id="view-enemy">
    <canvas id="canvas-enemy"></canvas>
    <div class="view-label">ENEMY TERRITORY</div>
    <div class="hpbar-wrap" style="top:auto;bottom:5px;">
      <div class="hp-label">ENEMY</div>
      <div class="hp-bg"><div class="hp-fill" id="en-hp-fill" style="width:100%"></div></div>
      <div class="hp-num" id="en-hp-num">300</div>
    </div>
  </div>
  <div class="view-divider"></div>
  <div id="view-self">
    <canvas id="canvas-self"></canvas>
    <div class="view-label">YOUR TERRITORY</div>
    <div class="hpbar-wrap" style="top:5px;">
      <div class="hp-label">YOU</div>
      <div class="hp-bg"><div class="hp-fill" id="my-hp-fill" style="width:100%"></div></div>
      <div class="hp-num" id="my-hp-num">300</div>
    </div>
  </div>
  <div id="ctrl-area">
    <div id="tower-ctrl">
      <button class="btn-move" id="btn-back">◀</button>
      <button class="btn-move" id="btn-fwd">▶</button>
      <button class="btn-attack" id="btn-sword">⚔ ATTACK</button>
      <div id="my-hp-ctrl">HP <span id="hp-display">300</span></div>
    </div>
    <div id="troop-btns"></div>
  </div>
</div>

<div id="result-overlay">
  <h1 id="result-title">WIN</h1>
  <button class="btn-gold" onclick="location.reload()">もう一度</button>
</div>
<div id="disconnect-msg">
  <h2>DISCONNECTED</h2><p>相手が切断しました</p>
  <button class="btn-gold" onclick="location.reload()">ロビーに戻る</button>
</div>
<div id="role-banner"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, onDisconnect }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA89lo2epwcfZHcEMn8ckGPwanVsEgQqkU",
  authDomain: "fighting-game-35a21.firebaseapp.com",
  databaseURL: "https://fighting-game-35a21-default-rtdb.firebaseio.com",
  projectId: "fighting-game-35a21",
  storageBucket: "fighting-game-35a21.firebasestorage.app",
  messagingSenderId: "763166903946",
  appId: "1:763166903946:web:34a09f768b8f353fdb2773"
};
const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);

// ============================================================
// TROOP DEFINITIONS  ※コストは元の値、HPは300スケール
// ============================================================
const TROOPS = [
  {id:0, name:'ハヤブサ',    icon:'🦅', lane:'sky',  cost:8,  hp:50,  atk:6,  def:1, spd:6.6, range:55},
  {id:1, name:'ドラゴン',    icon:'🐉', lane:'sky',  cost:20, hp:150, atk:18, def:4, spd:3.0, range:75},
  {id:2, name:'騎士',        icon:'🛡️', lane:'land', cost:10, hp:100, atk:8,  def:6, spd:2.4, range:38},
  {id:3, name:'弓兵',        icon:'🏹', lane:'land', cost:7,  hp:40,  atk:12, def:1, spd:3.6, range:85},
  {id:4, name:'オーガ',      icon:'👹', lane:'land', cost:18, hp:200, atk:22, def:3, spd:1.8, range:32},
  {id:5, name:'忍者',        icon:'🥷', lane:'land', cost:9,  hp:60,  atk:10, def:2, spd:7.5, range:28},
  {id:6, name:'クラーケン',  icon:'🐙', lane:'sea',  cost:16, hp:160, atk:16, def:5, spd:2.1, range:48},
  {id:7, name:'人魚',        icon:'🧜', lane:'sea',  cost:8,  hp:70,  atk:9,  def:2, spd:5.4, range:52},
  {id:8, name:'海竜',        icon:'🐲', lane:'sea',  cost:22, hp:220, atk:25, def:6, spd:1.5, range:65},
  {id:9, name:'フェニックス',icon:'🔥', lane:'sky',  cost:15, hp:100, atk:14, def:3, spd:4.5, range:70},
];

// ============================================================
// CONSTANTS
// ============================================================
const MAP_W      = 800;
const SIDE_W     = 400;   // 自陣幅（0〜400）
const SPAWN_X    = 55;
const MY_TWR_X0  = 28;
const EN_TWR_X0  = MAP_W - 28;
const TWR_SPD    = 5.4;   // タワー移動速度 (元の3倍)
const TWR_ATK    = 22;
const TWR_RANGE  = 50;
const MAX_HP     = 300;
const INVADE_DMG = 0.025;

// ============================================================
// STATE
// ============================================================
let myRole=null, roomRef=null, gameActive=false;
let troopIdCtr=0;

const gs={
  p1:{hp:MAX_HP, tx:MY_TWR_X0, troops:[], atkTimer:0},
  p2:{hp:MAX_HP, tx:MY_TWR_X0, troops:[], atkTimer:0},
  // エフェクトはFirebase経由で同期（両プレイヤーで同じ表示）
  effects:[], // [{id,type,owner,x,lane,life,maxLife}]
  tick:0, over:false, winner:null
};

const myInput={fwd:false, back:false, attack:false, spawnTroop:null};
let remoteInput={fwd:false, back:false, attack:false, spawnTroop:null};
let effectIdCtr=0;

// Canvas
const cvE=document.getElementById('canvas-enemy');
const cvS=document.getElementById('canvas-self');
const ctxE=cvE.getContext('2d');
const ctxS=cvS.getContext('2d');

function resizeCvs(){
  const w=window.innerWidth;
  const h=Math.floor((window.innerHeight-155)/2);
  [cvE,cvS].forEach(c=>{c.width=w;c.height=h;});
}
resizeCvs();
window.addEventListener('resize',resizeCvs);

// ============================================================
// LOBBY
// ============================================================
document.getElementById('btn-join').addEventListener('click',async()=>{
  const word=document.getElementById('room-input').value.trim().toUpperCase();
  if(!word)return;
  document.getElementById('btn-join').disabled=true;
  setStatus('接続中...','');
  roomRef=ref(db,'bf3_rooms/'+word);
  let snap;
  try{snap=await get(roomRef);}
  catch(e){setStatus('接続エラー','err');document.getElementById('btn-join').disabled=false;return;}
  const data=snap.val();
  if(!data||data.status==='finished'||data.status==='abandoned'){
    myRole='p1';
    await set(roomRef,{status:'waiting',gs:makeInitGs(),
      input_p1:{fwd:false,back:false,attack:false,spawnTroop:null},
      input_p2:{fwd:false,back:false,attack:false,spawnTroop:null}});
    onDisconnect(roomRef).update({status:'abandoned'});
    setStatus('⏳ 相手を待っています...','wait');
    startListening();
  } else if(data.status==='waiting'){
    myRole='p2';
    await update(roomRef,{status:'playing'});
    setStatus('マッチ成立！','ok');
    startListening();
    enterGame();
  } else {
    setStatus('その部屋は使用中です','err');
    document.getElementById('btn-join').disabled=false;
  }
});

function setStatus(msg,cls){const el=document.getElementById('lobby-status');el.textContent=msg;el.className=cls;}

function makeInitGs(){
  return{
    p1:{hp:MAX_HP,tx:MY_TWR_X0,troops:[],atkTimer:0},
    p2:{hp:MAX_HP,tx:MY_TWR_X0,troops:[],atkTimer:0},
    effects:[],tick:0,over:false,winner:null
  };
}

// ============================================================
// LISTENING
// ============================================================
function startListening(){
  onValue(roomRef,snap=>{
    const data=snap.val(); if(!data)return;
    if(myRole==='p1'&&data.input_p2) remoteInput=data.input_p2;
    if(myRole==='p2'&&data.gs) syncGs(data.gs);
    if(myRole==='p1'&&data.status==='playing'&&!gameActive){setStatus('マッチ成立！','ok');enterGame();}
    if(data.status==='abandoned'&&gameActive) showDisconnect();
  });
}

function syncGs(r){
  gs.p1.hp=r.p1.hp; gs.p1.tx=r.p1.tx; gs.p1.troops=r.p1.troops||[];
  gs.p2.hp=r.p2.hp; gs.p2.tx=r.p2.tx; gs.p2.troops=r.p2.troops||[];
  gs.effects=r.effects||[];
  gs.tick=r.tick; gs.over=r.over; gs.winner=r.winner;
  updateHUDs();
  if(gs.over&&gameActive){gameActive=false;showResult(gs.winner);}
}

// ============================================================
// ENTER GAME
// ============================================================
function enterGame(){
  if(gameActive)return;
  gameActive=true;
  document.getElementById('lobby').style.display='none';
  document.getElementById('game-wrap').style.display='flex';
  const banner=document.getElementById('role-banner');
  banner.style.display='block';
  banner.innerHTML=myRole==='p1'?'⚔ あなたは 青陣営 (1P)':'🗡️ あなたは 赤陣営 (2P)';
  setTimeout(()=>banner.style.display='none',2600);
  buildTroopButtons();
  setupControls();
  setInterval(sendInput,50);
  if(myRole==='p1'){
    let lastT=0;
    function hostLoop(ts){
      if(!gameActive&&!gs.over)return;
      if(ts-lastT>=33){lastT=ts;tickGame();pushGs();}
      renderAll();
      requestAnimationFrame(hostLoop);
    }
    requestAnimationFrame(hostLoop);
  } else {
    function clientLoop(){
      if(!gameActive&&!gs.over)return;
      renderAll();
      requestAnimationFrame(clientLoop);
    }
    requestAnimationFrame(clientLoop);
  }
}

// ============================================================
// INPUT SEND
// ============================================================
async function sendInput(){
  if(!roomRef||!gameActive)return;
  try{await update(roomRef,{['input_'+myRole]:{fwd:myInput.fwd,back:myInput.back,attack:myInput.attack,spawnTroop:myInput.spawnTroop}});}
  catch(e){}
  myInput.spawnTroop=null;
}

// ============================================================
// GAME TICK (p1 only)
// ============================================================
function tickGame(){
  if(gs.over)return;
  gs.tick++;

  // エフェクトのライフ更新
  gs.effects=gs.effects.filter(e=>e.life>0);
  gs.effects.forEach(e=>e.life--);

  applyInput(gs.p1,myInput,   gs.p2, 1);
  applyInput(gs.p2,remoteInput,gs.p1,-1);
  moveTroops(gs.p1,gs.p2, 1);
  moveTroops(gs.p2,gs.p1,-1);
  invasionDmg(gs.p1,gs.p2);
  invasionDmg(gs.p2,gs.p1);

  gs.p1.hp=Math.max(0,gs.p1.hp);
  gs.p2.hp=Math.max(0,gs.p2.hp);
  gs.p1.troops=gs.p1.troops.filter(t=>t.hp>0);
  gs.p2.troops=gs.p2.troops.filter(t=>t.hp>0);

  if(gs.p1.hp<=0||gs.p2.hp<=0){
    gs.over=true; gs.winner=gs.p1.hp<=0?'p2':'p1';
    gameActive=false; showResult(gs.winner);
  }
  updateHUDs();
}

function applyInput(player,input,opp,dir){
  // タワー移動 (敵陣も含め全マップ移動可)
  if(input.fwd)  player.tx=Math.min(MAP_W-20, player.tx+TWR_SPD);
  if(input.back) player.tx=Math.max(20,        player.tx-TWR_SPD);

  if(player.atkTimer>0) player.atkTimer--;
  if(input.attack&&player.atkTimer===0){
    player.atkTimer=28;
    const power=calcTowerAtk(player.hp);
    const owner=player===gs.p1?'p1':'p2';
    // エフェクト登録（タワー攻撃）
    gs.effects.push({id:effectIdCtr++,type:'tower',owner,
      x:player.tx, range:TWR_RANGE, life:16, maxLife:16});
    // ダメージ
    opp.troops.forEach(t=>{
      const ex=dir>0?t.x:MAP_W-t.x;
      if(Math.abs(ex-player.tx)<TWR_RANGE) t.hp-=power;
    });
    opp.troops=opp.troops.filter(t=>t.hp>0);
  }

  if(input.spawnTroop!==null){
    const def=TROOPS[input.spawnTroop];
    if(def&&player.hp>def.cost+8){
      player.hp-=def.cost;
      player.troops.push({
        id:troopIdCtr++, defId:def.id,
        x:SPAWN_X, hp:def.hp, maxHp:def.hp,
        atk:def.atk, def:def.def,
        spd:def.spd, range:def.range,
        lane:def.lane, atkTimer:0, attacking:false
      });
    }
  }
}

function calcTowerAtk(hp){
  const r=1-(Math.max(0,hp)/MAX_HP);
  return Math.round(TWR_ATK*(1+r*2));
}

function moveTroops(owner,opp,dir){
  owner.troops.forEach(t=>{
    if(t.atkTimer>0){t.atkTimer--;t.attacking=true;return;}
    t.attacking=false;
    const target=findTarget(t,opp.troops);
    if(target){
      // 攻撃エフェクト登録
      gs.effects.push({
        id:effectIdCtr++, type:'troop',
        owner:owner===gs.p1?'p1':'p2',
        x:t.x, tx:target.x, lane:t.lane,
        life:12, maxLife:12
      });
      const dmg=Math.max(1,t.atk-target.def);
      target.hp-=dmg;
      t.atkTimer=20; t.attacking=true;
    } else {
      // 敵タワーへの攻撃判定
      const towerPos=dir>0?EN_TWR_X0:MAP_W-EN_TWR_X0;
      const mirX=dir>0?t.x:MAP_W-t.x; // p1論理座標系
      if(Math.abs(mirX-towerPos)<t.range){
        opp.hp-=t.atk*0.06;
        gs.effects.push({id:effectIdCtr++,type:'troop',
          owner:owner===gs.p1?'p1':'p2',
          x:t.x, tx:null, lane:t.lane, life:12, maxLife:12});
        t.atkTimer=20; t.attacking=true;
      } else {
        t.x+=t.spd; // 前進
      }
    }
  });
}

function findTarget(t,enemies){
  let best=null,bd=t.range;
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    if(!canAtk(t.lane,e.lane))return;
    const d=Math.abs(e.x-t.x);
    if(d<bd){bd=d;best=e;}
  });
  return best;
}

function canAtk(a,d){
  if(a==='sky')  return d==='sky'||d==='land';
  if(a==='land') return d==='land';
  if(a==='sea')  return d==='sea';
  return false;
}

function invasionDmg(attacker,defender){
  if(attacker.tx>MAP_W/2) defender.hp-=INVADE_DMG;
  attacker.troops.forEach(t=>{if(t.x>MAP_W-90) defender.hp-=0.01;});
}

// ============================================================
// PUSH STATE
// ============================================================
async function pushGs(){
  if(!roomRef)return;
  try{
    await update(roomRef,{gs:{
      p1:{hp:+gs.p1.hp.toFixed(1),tx:+gs.p1.tx.toFixed(1),troops:slim(gs.p1.troops),atkTimer:gs.p1.atkTimer},
      p2:{hp:+gs.p2.hp.toFixed(1),tx:+gs.p2.tx.toFixed(1),troops:slim(gs.p2.troops),atkTimer:gs.p2.atkTimer},
      effects:gs.effects.slice(0,30).map(e=>({...e})),
      tick:gs.tick,over:gs.over,winner:gs.winner||null
    }});
  }catch(e){}
}

function slim(arr){
  return arr.slice(0,25).map(t=>({
    id:t.id,defId:t.defId,x:+t.x.toFixed(1),
    hp:+t.hp.toFixed(1),maxHp:t.maxHp,lane:t.lane,attacking:!!t.attacking
  }));
}

// ============================================================
// RENDER
// ============================================================
function renderAll(){
  const cw=cvS.width, ch=cvS.height;
  drawSelfView(ctxS,cw,ch);
  drawEnemyView(ctxE,cw,ch);
}

function drawSelfView(ctx,cw,ch){
  ctx.clearRect(0,0,cw,ch);
  drawBg(ctx,cw,ch);
  const myGs=myRole==='p1'?gs.p1:gs.p2;
  const enGs=myRole==='p1'?gs.p2:gs.p1;
  const myOwner=myRole;
  const enOwner=myRole==='p1'?'p2':'p1';

  // 敵の侵入歩兵（ミラーX）
  enGs.troops.forEach(t=>{
    const mirX=MAP_W-t.x;
    if(mirX<SIDE_W) drawTroop(ctx,{...t,x:mirX},cw,ch,true);
  });
  // 自分の歩兵（自陣側）
  myGs.troops.forEach(t=>{
    if(t.x<SIDE_W) drawTroop(ctx,t,cw,ch,false);
  });

  // エフェクト（自陣視点）
  gs.effects.forEach(e=>{
    if(e.type==='tower'&&e.owner===myOwner){
      drawTowerEffect(ctx,toScreen(e.x,cw),ch,e);
    }
    if(e.type==='troop'&&e.owner===myOwner){
      const sx=toScreen(e.x,cw);
      if(e.x<SIDE_W) drawTroopEffect(ctx,sx,ch,e);
    }
    if(e.type==='troop'&&e.owner===enOwner){
      const mirX=MAP_W-e.x;
      if(mirX<SIDE_W) drawTroopEffect(ctx,toScreen(mirX,cw),ch,e);
    }
  });

  // 自タワー
  drawTower(ctx,toScreen(myGs.tx,cw),ch,myGs.hp,false);
  // エフェクト（敵タワー攻撃が自陣に来る）
  gs.effects.forEach(e=>{
    if(e.type==='tower'&&e.owner===enOwner){
      // 敵タワーは敵陣にいる → 自陣視点ではミラー
      const mirX=MAP_W-e.x;
      if(mirX<SIDE_W) drawTowerEffect(ctx,toScreen(mirX,cw),ch,e);
    }
  });
}

function drawEnemyView(ctx,cw,ch){
  ctx.clearRect(0,0,cw,ch);
  drawBg(ctx,cw,ch);
  const myGs=myRole==='p1'?gs.p1:gs.p2;
  const enGs=myRole==='p1'?gs.p2:gs.p1;
  const myOwner=myRole;
  const enOwner=myRole==='p1'?'p2':'p1';

  // 自分の侵入歩兵（敵陣 = x > SIDE_W → ミラー）
  myGs.troops.forEach(t=>{
    if(t.x>=SIDE_W){
      const mirX=MAP_W-t.x;
      drawTroop(ctx,{...t,x:mirX},cw,ch,false);
    }
  });
  // 敵の歩兵（敵陣側）
  enGs.troops.forEach(t=>{
    if(t.x<SIDE_W) drawTroop(ctx,t,cw,ch,true);
  });

  // エフェクト（敵視点）
  gs.effects.forEach(e=>{
    if(e.type==='tower'&&e.owner===enOwner){
      drawTowerEffect(ctx,toScreen(e.x,cw),ch,e);
    }
    if(e.type==='troop'&&e.owner===enOwner){
      if(e.x<SIDE_W) drawTroopEffect(ctx,toScreen(e.x,cw),ch,e);
    }
    if(e.type==='troop'&&e.owner===myOwner){
      const mirX=MAP_W-e.x;
      if(mirX<SIDE_W) drawTroopEffect(ctx,toScreen(mirX,cw),ch,e);
    }
  });

  // 敵タワー（右端側）
  const enTX=cw-toScreen(enGs.tx,cw);
  drawTower(ctx,enTX,ch,enGs.hp,true);
}

function drawBg(ctx,cw,ch){
  // 空
  const sg=ctx.createLinearGradient(0,0,0,ch*0.33);
  sg.addColorStop(0,'#06101e'); sg.addColorStop(1,'#0e2038');
  ctx.fillStyle=sg; ctx.fillRect(0,0,cw,ch*0.33);
  // 星
  ctx.fillStyle='#ffffff44';
  [[0.1,0.05],[0.3,0.12],[0.5,0.04],[0.7,0.09],[0.85,0.14],[0.15,0.18],[0.65,0.18]].forEach(([rx,ry])=>{
    ctx.beginPath(); ctx.arc(rx*cw,ry*ch*0.33,1,0,Math.PI*2); ctx.fill();
  });
  // 雲
  ctx.fillStyle='#ffffff0c';
  [[0.2,ch*0.08,35,10],[0.55,ch*0.05,48,13],[0.82,ch*0.13,28,8]].forEach(([rx,y,w,h])=>{
    ctx.beginPath(); ctx.ellipse(rx*cw,y,w,h,0,0,Math.PI*2); ctx.fill();
  });
  // 陸
  const lg=ctx.createLinearGradient(0,ch*0.33,0,ch*0.66);
  lg.addColorStop(0,'#142010'); lg.addColorStop(1,'#1e3018');
  ctx.fillStyle=lg; ctx.fillRect(0,ch*0.33,cw,ch*0.33);
  // 草ライン
  ctx.fillStyle='#2a5018cc';
  for(let x=0;x<cw;x+=20){ctx.fillRect(x,ch*0.33,2,5);}
  // 木
  [[0.08,0.38],[0.22,0.35],[0.45,0.37],[0.72,0.36],[0.9,0.39]].forEach(([rx,ry])=>{
    ctx.fillStyle='#1a3010';
    ctx.fillRect(rx*cw-2,ry*ch,4,ch*0.06);
    ctx.fillStyle='#2a5018';
    ctx.beginPath(); ctx.arc(rx*cw,ry*ch,8,0,Math.PI*2); ctx.fill();
  });
  // 海
  const wg=ctx.createLinearGradient(0,ch*0.66,0,ch);
  wg.addColorStop(0,'#08182e'); wg.addColorStop(1,'#040e1c');
  ctx.fillStyle=wg; ctx.fillRect(0,ch*0.66,cw,ch*0.34);
  // 波紋
  ctx.strokeStyle='#1a4a7a66'; ctx.lineWidth=1;
  for(let x=0;x<cw;x+=30){
    ctx.beginPath(); ctx.moveTo(x,ch*0.72);
    ctx.quadraticCurveTo(x+10,ch*0.715,x+20,ch*0.72); ctx.stroke();
  }
  // ゾーンラベル
  ctx.font='bold 9px Rajdhani'; ctx.fillStyle='#ffffff1a';
  ctx.fillText('✈ SKY',5,11);
  ctx.fillText('⚔ LAND',5,ch*0.33+13);
  ctx.fillText('🌊 SEA',5,ch*0.66+13);
  // 境界線（自陣端）
  ctx.strokeStyle='#ffd70018'; ctx.lineWidth=1.5; ctx.setLineDash([4,8]);
  ctx.beginPath(); ctx.moveTo(cw-1,0); ctx.lineTo(cw-1,ch); ctx.stroke();
  ctx.setLineDash([]);
}

function drawTroop(ctx,t,cw,ch,isEnemy){
  const def=TROOPS[t.defId]; if(!def)return;
  const sx=(t.x/SIDE_W)*cw;
  const sy=laneY(t.lane,ch);
  const sz=ch*0.14; // 大きめサイズ

  // 攻撃中は震える
  const shake=t.attacking?(Math.random()-0.5)*3:0;
  const drawX=sx+shake;

  // 影
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(drawX,sy+sz*0.6,sz*0.5,sz*0.12,0,0,Math.PI*2); ctx.fill();

  // 陣営グロー
  ctx.shadowColor=isEnemy?'#ff6644':'#44aaff';
  ctx.shadowBlur=t.attacking?14:6;

  // アイコン（大きめ）
  ctx.font=`${Math.round(sz*1.8)}px serif`;
  ctx.textAlign='center';
  ctx.fillText(def.icon,drawX,sy+sz*0.7);
  ctx.textAlign='left';
  ctx.shadowBlur=0;

  // HPバー（幅広め）
  const barW=sz*2.4;
  const hpR=Math.max(0,t.hp/t.maxHp);
  ctx.fillStyle='#0008'; ctx.fillRect(drawX-barW/2,sy-sz*0.85,barW,5);
  const hpCol=hpR>0.5?'#44ff88':hpR>0.25?'#ffcc00':'#ff4444';
  ctx.fillStyle=hpCol;
  ctx.fillRect(drawX-barW/2,sy-sz*0.85,barW*hpR,5);
  // HPバー枠
  ctx.strokeStyle='#ffffff22'; ctx.lineWidth=0.5;
  ctx.strokeRect(drawX-barW/2,sy-sz*0.85,barW,5);

  // 攻撃中インジケーター
  if(t.attacking){
    ctx.fillStyle=isEnemy?'#ff664488':'#44aaff88';
    ctx.beginPath(); ctx.arc(drawX,sy-sz,4,0,Math.PI*2); ctx.fill();
  }
}

function drawTower(ctx,sx,ch,hp,isEnemy){
  const hpR=Math.max(0,hp/MAX_HP);
  const col=isEnemy?'#ff6644':'#44aaff';
  const sz=ch*0.15;
  if(hpR<0.3){ctx.shadowColor=isEnemy?'#ff4444':'#ff4444';ctx.shadowBlur=14;}

  // 塔の壁
  const wallGrad=ctx.createLinearGradient(sx-sz*0.5,0,sx+sz*0.5,0);
  wallGrad.addColorStop(0,isEnemy?'#1a0808':'#081018');
  wallGrad.addColorStop(0.5,isEnemy?'#3a1010':'#0c1e2e');
  wallGrad.addColorStop(1,isEnemy?'#1a0808':'#081018');
  ctx.fillStyle=wallGrad;
  ctx.fillRect(sx-sz*0.5,ch*0.27,sz,ch*0.46);
  // 塔の縁石
  ctx.fillStyle=isEnemy?'#4a1818':'#0e2236';
  ctx.fillRect(sx-sz*0.6,ch*0.27,sz*1.2,ch*0.04);
  ctx.fillRect(sx-sz*0.6,ch*0.73-ch*0.02,sz*1.2,ch*0.04);
  // 旗
  ctx.fillStyle=col;
  ctx.beginPath();
  ctx.moveTo(sx,ch*0.14); ctx.lineTo(sx+sz*0.6,ch*0.21); ctx.lineTo(sx,ch*0.27);
  ctx.fill();
  ctx.strokeStyle=col+'88'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(sx,ch*0.14); ctx.lineTo(sx,ch*0.74); ctx.stroke();
  // 剣士
  ctx.shadowColor=col; ctx.shadowBlur=8;
  ctx.font=`${Math.round(sz*1.1)}px serif`;
  ctx.textAlign='center';
  ctx.fillText(isEnemy?'🗡️':'⚔️',sx,ch*0.67);
  ctx.textAlign='left';
  ctx.shadowBlur=0;
  // HPゲージ
  ctx.fillStyle='#0008'; ctx.fillRect(sx-22,ch*0.74,44,6);
  const hcol=hpR>0.5?'#44ff88':hpR>0.25?'#ffcc00':'#ff4444';
  ctx.fillStyle=hcol; ctx.fillRect(sx-22,ch*0.74,44*hpR,6);
  ctx.strokeStyle='#ffffff22'; ctx.lineWidth=0.5;
  ctx.strokeRect(sx-22,ch*0.74,44,6);
  // HP数値
  ctx.fillStyle='#ccc'; ctx.font='bold 9px Cinzel'; ctx.textAlign='center';
  ctx.fillText(Math.max(0,Math.floor(hp)),sx,ch*0.86);
  ctx.textAlign='left';
}

// タワー攻撃エフェクト（縦の閃光 + 剣マーク）
function drawTowerEffect(ctx,sx,ch,e){
  const prog=1-(e.life/e.maxLife);
  const alpha=(1-prog)*0.85;
  const rw=(e.range/SIDE_W)*cvS.width;
  ctx.save();
  ctx.globalAlpha=alpha;
  const grd=ctx.createLinearGradient(sx,0,sx+rw,0);
  grd.addColorStop(0,'rgba(255,220,60,0.9)');
  grd.addColorStop(0.4,'rgba(255,120,20,0.5)');
  grd.addColorStop(1,'rgba(255,40,0,0)');
  ctx.fillStyle=grd; ctx.fillRect(sx,0,rw,ch);
  const flash=ctx.createRadialGradient(sx,ch*0.5,0,sx,ch*0.5,rw*0.7);
  flash.addColorStop(0,'rgba(255,255,180,0.7)');
  flash.addColorStop(0.5,'rgba(255,140,0,0.2)');
  flash.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=flash; ctx.fillRect(sx,0,rw*1.3,ch);
  if(prog<0.5){
    ctx.strokeStyle='#ffffcc'; ctx.lineWidth=2.5;
    ctx.shadowColor='#ffaa00'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.moveTo(sx+4,ch*0.15); ctx.lineTo(sx+rw*0.6,ch*0.85); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(sx+4,ch*0.85); ctx.lineTo(sx+rw*0.6,ch*0.15); ctx.stroke();
  }
  ctx.restore();
}

// 歩兵攻撃エフェクト（レーンに沿った閃光）
function drawTroopEffect(ctx,sx,ch,e){
  const prog=1-(e.life/e.maxLife);
  const alpha=(1-prog)*0.75;
  const sy=laneY(e.lane,ch);
  const laneColors={sky:'#88ddff',land:'#88ff88',sea:'#4488ff'};
  const col=laneColors[e.lane]||'#ffffff';
  ctx.save();
  ctx.globalAlpha=alpha;
  // 攻撃波紋（レーン中心）
  const r=(prog*0.6+0.15)*50;
  const grad=ctx.createRadialGradient(sx,sy,0,sx,sy,r);
  grad.addColorStop(0,col+'ee');
  grad.addColorStop(0.4,col+'66');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;
  ctx.beginPath(); ctx.ellipse(sx,sy,r,r*0.4,0,0,Math.PI*2); ctx.fill();
  // 衝撃線
  if(prog<0.4){
    ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.shadowColor=col; ctx.shadowBlur=8;
    for(let i=0;i<4;i++){
      const angle=(i/4)*Math.PI*2;
      const len=r*0.8;
      ctx.beginPath();
      ctx.moveTo(sx+Math.cos(angle)*6,sy+Math.sin(angle)*3);
      ctx.lineTo(sx+Math.cos(angle)*len,sy+Math.sin(angle)*len*0.4);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function toScreen(wx,cw){ return (wx/SIDE_W)*cw; }
function laneY(lane,ch){
  if(lane==='sky')  return ch*0.17;
  if(lane==='land') return ch*0.50;
  if(lane==='sea')  return ch*0.83;
  return ch*0.50;
}

// ============================================================
// HUD
// ============================================================
function updateHUDs(){
  const me=myRole==='p1'?gs.p1:gs.p2;
  const en=myRole==='p1'?gs.p2:gs.p1;
  const mhp=Math.max(0,Math.floor(me.hp));
  const ehp=Math.max(0,Math.floor(en.hp));
  document.getElementById('my-hp-fill').style.width=(mhp/MAX_HP*100)+'%';
  document.getElementById('en-hp-fill').style.width=(ehp/MAX_HP*100)+'%';
  document.getElementById('my-hp-num').textContent=mhp;
  document.getElementById('en-hp-num').textContent=ehp;
  document.getElementById('hp-display').textContent=mhp;
  TROOPS.forEach((t,i)=>{
    const btn=document.getElementById('tb'+i);
    if(btn) btn.classList.toggle('disabled',me.hp<=t.cost+8);
  });
}

// ============================================================
// TROOP BUTTONS
// ============================================================
function buildTroopButtons(){
  const c=document.getElementById('troop-btns');
  TROOPS.forEach((t,i)=>{
    const btn=document.createElement('div');
    btn.className=`troop-btn ${t.lane}-btn`;
    btn.id='tb'+i;
    btn.innerHTML=`
      <div class="lane-badge ${t.lane}-badge">${t.lane==='sky'?'✈':t.lane==='sea'?'🌊':'⚔'}</div>
      <div class="troop-icon">${t.icon}</div>
      <div class="troop-name">${t.name}</div>
      <div class="troop-cost">-${t.cost}HP</div>`;
    const spawn=()=>{
      const me=myRole==='p1'?gs.p1:gs.p2;
      if(me.hp<=t.cost+8){
        btn.style.border='1.5px solid #ff4444';
        setTimeout(()=>btn.style.border='',400);
        return;
      }
      myInput.spawnTroop=i;
    };
    btn.addEventListener('touchstart',e=>{e.preventDefault();spawn();},{passive:false});
    btn.addEventListener('mousedown',spawn);
    c.appendChild(btn);
  });
}

// ============================================================
// CONTROLS
// ============================================================
function setupControls(){
  hold('btn-fwd', ()=>myInput.fwd=true,  ()=>myInput.fwd=false);
  hold('btn-back',()=>myInput.back=true, ()=>myInput.back=false);
  hold('btn-sword',()=>myInput.attack=true,()=>myInput.attack=false);
}
function hold(id,dn,up){
  const el=document.getElementById(id); if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();dn();el.classList.add('pressed');},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();up();el.classList.remove('pressed');},{passive:false});
  el.addEventListener('mousedown', ()=>{dn();el.classList.add('pressed');});
  el.addEventListener('mouseup',   ()=>{up();el.classList.remove('pressed');});
  el.addEventListener('mouseleave',()=>{up();el.classList.remove('pressed');});
}

// ============================================================
// RESULT / DISCONNECT
// ============================================================
function showResult(winner){
  const isWin=winner===myRole;
  const ov=document.getElementById('result-overlay');
  const t=document.getElementById('result-title');
  t.textContent=isWin?'VICTORY':'DEFEAT';
  t.style.color=isWin?'#ffd700':'#ff4444';
  t.style.textShadow=isWin?'0 0 40px #ffd70099':'0 0 40px #ff444499';
  ov.style.display='flex';
  if(roomRef) update(roomRef,{status:'finished'}).catch(()=>{});
}
function showDisconnect(){
  gameActive=false;
  document.getElementById('disconnect-msg').style.display='flex';
}
